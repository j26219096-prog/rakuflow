rakuflow:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'rakuflow') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'changeme_strong_password') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'rakuflow') }}"
      schema: public
      threads: 4
      connect_timeout: 10
    prod:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST') }}"
      port: "{{ env_var('POSTGRES_PORT') | int }}"
      user: "{{ env_var('POSTGRES_USER') }}"
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      dbname: "{{ env_var('POSTGRES_DB') }}"
      schema: public
      threads: 8
      connect_timeout: 10
