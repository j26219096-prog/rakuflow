version: 2

sources:
  - name: staging
    database: "{{ env_var('POSTGRES_DB', 'rakuflow') }}"
    schema: staging
    tables:
      - name: raw_orders
        description: "Raw orders enriched with customer city/state, written by Spark consumer."
        columns:
          - name: order_id
            description: "Unique identifier for each order."
            tests:
              - not_null
          - name: customer_id
            description: "Unique identifier for each customer."
            tests:
              - not_null
          - name: order_status
            description: "Current status of the order."
            tests:
              - accepted_values:
                  values:
                    - delivered
                    - shipped
                    - processing
                    - approved
                    - invoiced
                    - unavailable
                    - canceled

      - name: raw_payments
        description: "Raw payment records written by Spark consumer."
        columns:
          - name: order_id
            tests:
              - not_null

      - name: raw_sellers
        description: "Seller reference data loaded from Olist sellers CSV."
        columns:
          - name: seller_id
            tests:
              - not_null
              - unique

      - name: raw_order_items
        description: "Order item reference data loaded from Olist order items CSV."
        columns:
          - name: order_id
            tests:
              - not_null


models:
  - name: stg_orders
    description: "Cleaned and type-cast orders from raw_orders."
    columns:
      - name: order_id
        description: "Primary key for orders."
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values:
                - delivered
                - shipped
                - processing
                - approved
                - invoiced
                - unavailable
                - canceled

  - name: stg_customers
    description: "Deduplicated and normalized customers."
    columns:
      - name: customer_key
        description: "Surrogate key for customers."
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: stg_sellers
    description: "Deduplicated sellers with normalized city/state."
    columns:
      - name: seller_key
        tests:
          - not_null
          - unique
      - name: seller_id
        tests:
          - not_null
          - unique

  - name: fact_orders
    description: "Fact table: one row per order with dimension keys and metrics."
    columns:
      - name: order_id
        description: "Grain: one row per order."
        tests:
          - not_null
          - unique
      - name: customer_key
        tests:
          - not_null
      - name: payment_value
        tests:
          - not_null
      - name: order_status
        tests:
          - accepted_values:
              values:
                - delivered
                - shipped
                - processing
                - approved
                - invoiced
                - unavailable
                - canceled

  - name: dim_customers
    description: "Customer dimension (SCD Type 1)."
    columns:
      - name: customer_key
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: dim_sellers
    description: "Seller dimension with aggregated metrics."
    columns:
      - name: seller_key
        tests:
          - not_null
          - unique

  - name: agg_daily_gmv
    description: "Daily GMV aggregate table."
    columns:
      - name: order_date
        tests:
          - not_null
          - unique
      - name: total_gmv
        tests:
          - not_null
