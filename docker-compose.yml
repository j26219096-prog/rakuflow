version: "3.9"

# ══════════════════════════════════════════════════════════════════════════════
# RakuFlow Docker Compose
# NOTE: Uses your existing 'rakuten_db' PostgreSQL container on localhost:5432
# Services started here: zookeeper, kafka, airflow-init,
#                        airflow-webserver, airflow-scheduler, streamlit
# Network: rakuflow-network
# ══════════════════════════════════════════════════════════════════════════════

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.0
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    # Points to the host machine's rakuten_db postgres container
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@host.docker.internal:${POSTGRES_PORT}/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW_FERNET_KEY}"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW__SMTP__SMTP_HOST: "${SMTP_HOST:-localhost}"
    AIRFLOW__SMTP__SMTP_MAIL_FROM: "${ALERT_EMAIL:-data-eng@rakuflow.io}"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # Pipeline env vars forwarded to tasks
    KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    POSTGRES_HOST: host.docker.internal
    POSTGRES_PORT: "${POSTGRES_PORT}"
    POSTGRES_DB: "${POSTGRES_DB}"
    POSTGRES_USER: "${POSTGRES_USER}"
    POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    RAKUFLOW_HOME: /opt/rakuflow
    DATA_DIR: /opt/rakuflow/data/raw
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs/airflow:/opt/airflow/logs
    - ./ingestion:/opt/rakuflow/ingestion
    - ./processing:/opt/rakuflow/processing
    - ./dbt_project:/opt/rakuflow/dbt_project
    - ./quality:/opt/rakuflow/quality
    - ./data:/opt/rakuflow/data
    - ./requirements-dev.txt:/requirements-dev.txt
  extra_hosts:
    - "host.docker.internal:host-gateway"
  networks:
    - rakuflow-network
  restart: unless-stopped

services:

  # ── Zookeeper ──────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: rakuflow-zookeeper
    hostname: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - rakuflow-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc -w 2 localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Kafka ──────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: rakuflow-kafka
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - rakuflow-network
    restart: unless-stopped
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 45s

  # ── Airflow Init ───────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: rakuflow-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install --quiet -r /requirements-dev.txt
        airflow db upgrade
        airflow users create \
          --username admin \
          --firstname RakuFlow \
          --lastname Admin \
          --role Admin \
          --email admin@rakuflow.io \
          --password "${AIRFLOW_ADMIN_PASSWORD:-admin123}" || true
    restart: "no"

  # ── Airflow Webserver ──────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: rakuflow-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Airflow Scheduler ──────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: rakuflow-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Streamlit Dashboard ────────────────────────────────────────────────────
  streamlit:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: rakuflow-streamlit
    hostname: streamlit
    ports:
      - "8501:8501"
    environment:
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: "${POSTGRES_PORT}"
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - rakuflow-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  kafka-data:
    driver: local
  zookeeper-data:
    driver: local
  zookeeper-logs:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  rakuflow-network:
    external: true
    name: rakuflow-network
